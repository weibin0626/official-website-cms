services:
  - type: web
    name: official-website-cms-api
    env: node
    plan: free
    region: oregon  # 可选：oregon, ohio, frankfurt, singapore
    buildCommand: |
      cd server && npm install && npx prisma generate && npm run build && npx prisma db push
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h

databases:
  - name: cms-db
    region: oregon
    plan: free
